<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Brújula rings">
  <!-- Rings layer only (broken ring + signal arcs), split out of logo-brujula.svg.
       Transparent background; same 256 viewBox as logo-compass.svg so the two
       layers overlay pixel-perfectly. -->
  <g id="rings">
    <!-- broken ring: gap from 38° to 142° (clockwise from north), centered east -->
    <path d="M 182.2 58.7 A 88 88 0 1 0 182.2 197.3" fill="none" stroke="#eff4f1" stroke-width="4.5" stroke-linecap="round"/>
    <!-- signal arcs inside the gap, concentric with the ring -->
    <path d="M 186 101 A 64 64 0 0 1 186 155" fill="none" stroke="#eff4f1" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 200.1 79.3 A 87 87 0 0 1 200.1 176.7" fill="none" stroke="#eff4f1" stroke-width="4.5" stroke-linecap="round"/>
  </g>
</svg>
