<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Brújula logo, needle spinning">
  <!-- Animated logo: rings static, needle rotating continuously around the pivot.
       SMIL animateTransform (no CSS/JS) so it animates even when used as
       <img src="..."> — offline-safe, zero dependencies. -->
  <!-- bosque background disc (delete for transparent use) -->
  <circle cx="128" cy="128" r="128" fill="#0e1411"/>

  <!-- static rings layer -->
  <g id="rings">
    <path d="M 191.9 84.1 A 78 78 0 1 1 172.6 66.7" fill="none" stroke="#eff4f1" stroke-width="8" stroke-linecap="round"/>
    <path d="M 186 52 A 20 20 0 0 1 204 70" fill="none" stroke="#b03a46" stroke-width="7" stroke-linecap="round"/>
    <path d="M 196 30 A 42 42 0 0 1 226 60" fill="none" stroke="#b03a46" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- rotating needle -->
  <g id="needle">
    <polygon points="128,52 152,128 128,120 104,128" fill="#b03a46"/>
    <polygon points="128,204 104,128 128,136 152,128" fill="#eff4f1"/>
    <animateTransform attributeName="transform" type="rotate"
      from="0 128 128" to="360 128 128"
      dur="2.8s" repeatCount="indefinite"/>
  </g>

  <!-- static pivot on top -->
  <circle cx="128" cy="128" r="9" fill="#0e1411" stroke="#eff4f1" stroke-width="5"/>
</svg>
