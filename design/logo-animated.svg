<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Brújula logo, needle spinning">
  <!-- Animated logo: rings and pivot static, needle does one full 360° turn —
       starts at north, eases in slowly, accelerates, then decelerates back to
       north and holds briefly before looping. SMIL animateTransform (no CSS/JS)
       so it animates even when used as <img src="..."> — offline-safe. -->
  <!-- bosque background disc (delete for transparent use) -->
  <circle cx="128" cy="128" r="128" fill="#0e1411"/>

  <!-- static rings layer -->
  <g id="rings">
    <path d="M 182.2 58.7 A 88 88 0 1 0 182.2 197.3" fill="none" stroke="#eff4f1" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 186 101 A 64 64 0 0 1 186 155" fill="none" stroke="#eff4f1" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 200.1 79.3 A 87 87 0 0 1 200.1 176.7" fill="none" stroke="#eff4f1" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <!-- rotating needle: slow start → accelerate → decelerate, short hold at north -->
  <g id="needle">
    <polygon points="128,50.5 144.5,128 111.5,128" fill="#b03a46"/>
    <polygon points="111.5,128 144.5,128 128,205.5" fill="#eff4f1"/>
    <animateTransform attributeName="transform" type="rotate"
      values="0 128 128;360 128 128;360 128 128"
      keyTimes="0;0.82;1"
      calcMode="spline" keySplines="0.55 0 0.25 1;0 0 1 1"
      dur="3.6s" repeatCount="indefinite"/>
  </g>

  <!-- static pivot on top -->
  <circle cx="128" cy="128" r="9" fill="#b03a46" stroke="#8e2e39" stroke-width="2"/>
</svg>
